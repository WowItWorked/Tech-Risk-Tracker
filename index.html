<style>
  html, body { margin: 0; padding: 0; background: #FFFFFF; }
  body { color: #14171A; font-family: 'Public Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  * { box-sizing: border-box; }
  a { color: #0069AA; text-decoration-color: #C5E2F0; text-underline-offset: 3px; }
  a:hover { color: #005A93; text-decoration-color: #005A93; }
  button, input, select, textarea { font: inherit; color: inherit; background: none; border: none; padding: 0; }
  button { cursor: pointer; text-align: inherit; }
  input::placeholder, textarea::placeholder { color: #97A0A8; opacity: 1; }
  :focus-visible { outline: 3px solid rgba(0, 105, 170, 0.35); outline-offset: 2px; }
  ::selection { background: #10314F; color: #FFFFFF; }
  @keyframes hzPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  @keyframes hzHl { 0% { background-color: #FDEAD7; } 100% { background-color: transparent; } }
  @keyframes hzIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  /* hover / focus / active states (ported from the design's style-hover / style-focus / style-active) */
  .hv-ink:hover { color: #14171A !important; }
  .hv-row:hover { background: #E9EBED !important; }
  .hv-soft:hover { background: #F4F5F6 !important; }
  .hv-ul:hover { text-decoration: underline; }
  .hv-ul-gray:hover { text-decoration: underline; text-decoration-color: #97A0A8; }
  .fc-navy:focus { border-bottom-color: #10314F !important; }
  .btn-navy:hover { background: #0B2438 !important; }
  .btn-navy:active { transform: translateY(1px); }
